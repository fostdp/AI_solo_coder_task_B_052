server:
  port: 8080
  mode: debug

influxdb:
  addr: http://localhost:8086
  username: admin
  password: admin@2024
  database: ancient_wood_monitor
  precision: s
  write_queue_size: 4096
  write_max_retries: 3

lora:
  data_endpoint: /api/v1/lora/data
  device_count: 90
  udp_addr: ":5678"

alert:
  acoustic_event_threshold: 100
  moisture_threshold: 25.0
  wechat_webhook_url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your-key
  sms_api_url: https://sms.example.com/send
  sms_api_key: your-sms-api-key

fumigation:
  default_release_rate: 5.0
  wind_speed: 2.0
  wind_direction: 0
  stability_class: D

model:
  lstm_path: ./models/lstm_weights.json
  lstm_input_size: 8
  lstm_hidden_size: 32
  lstm_output_size: 1

pipeline:
  buffer_size: 4096
  lora_ingest:
    expected_items: 100000
    false_positive_rate: 0.001
    cache_ttl: 24h
    max_cache_size: 50000
  termite_lstm:
    ewma_acoustic_alpha: 0.3
    ewma_moisture_alpha: 0.25
    ewma_max_history: 96
    spike_threshold_sigma: 2.5
    consecutive_confirm: 2
    prediction_hours: 24
  fumigant_diffusion:
    default_release_rate: 5.0
    default_wind_speed: 2.0
    default_wind_direction: 0
    stability_class: D
    grid_resolution: 0.5
    grid_size_x: 20
    grid_size_y: 20
    grid_size_z: 12
    exposure_time_hours: 1.0
  alerter:
    acoustic_threshold: 100.0
    moisture_threshold: 25.0
    cooldown_period: 10m
    enable_wechat: false
    enable_sms: false
